name: Video Discovery Service

on:
  schedule:
    - cron: "0 12 * * *"  # Daily at 12 PM UTC
  workflow_dispatch:     # Manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Run discovery service
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          USER_API_KEY: ${{ secrets.USER_API_KEY }}
        run: python main.py

      - name: Success notification
        if: success()
        run: echo "✅ Discovery service completed successfully"

      - name: Failure notification
        if: failure()
        run: echo "❌ Discovery service failed - check logs above"