name: Video Discovery Bot

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      user_api_key:
        description: "Run for a specific user key only (optional)"
        required: false

jobs:
  get-users:
    name: Fetch active users
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.fetch.outputs.matrix }}
      has_users: ${{ steps.fetch.outputs.has_users }}

    steps:
      - name: Fetch user list from API
        id: fetch
        env:
          MASTER_API_KEY: ${{ secrets.MASTER_API_KEY }}
          MANUAL_KEY: ${{ github.event.inputs.user_api_key }}
        run: |
          if [ -n "$MANUAL_KEY" ]; then
            echo "matrix={\"include\":[{\"user_key\":\"$MANUAL_KEY\"}]}" >> $GITHUB_OUTPUT
            echo "has_users=true" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $MASTER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://social-bot-nine.vercel.app/dashboard/api/admin/due-users")

            if [ -z "$RESPONSE" ]; then
              echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
              echo "has_users=false" >> $GITHUB_OUTPUT
              echo "Found 0 users (API error or empty response)"
            else
              MATRIX=$(echo "$RESPONSE" | python3 -c "import json, sys; data = json.load(sys.stdin) if True else None; keys = data.get('keys', []) if data else []; print(json.dumps({'include': [{'user_key': k} for k in keys]}))")

              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

              USER_COUNT=$(echo "$RESPONSE" | python3 -c "import json, sys; print(len(json.load(sys.stdin).get('keys', [])))")

              echo "Found $USER_COUNT users"

              if [ "$USER_COUNT" -gt 0 ]; then
                echo "has_users=true" >> $GITHUB_OUTPUT
              else
                echo "has_users=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  run-bot:
    name: "Run bot → ${{ matrix.user_key }}"
    needs: get-users
    if: needs.get-users.outputs.has_users == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.get-users.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery bot
        env:
          USER_API_KEY: ${{ matrix.user_key }}
        run: python main.py

      - name: Upload discovered videos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "discovered-${{ matrix.user_key }}"
          path: discovered_videos.txt
          retention-days: 7
          if-no-files-found: ignore